{% extends "base.html" %}
{% block title %}Ogrenci Girisi{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5 mb-3">Ogrenci Girisi</h1>

        {% if hata %}
          <div class="alert alert-danger py-2">{{ hata }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('ogrenci_giris') }}" class="row g-3">
          <div class="col-12">
            <label class="form-label">TC / Ogrenci No</label>
            <input type="text" name="tc_no" maxlength="11" class="form-control" required />
          </div>
          <div class="col-12">
            <label class="form-label">E-posta</label>
            <input type="email" name="email" class="form-control" required />
          </div>
          <div class="col-12 d-grid">
            <button class="btn btn-primary">Panele Gir</button>
          </div>
        </form>

        <div class="alert alert-info py-2 mt-3 mb-0">
          Giris icin kayit formunda kullandiginiz TC / ogrenci no ve e-posta bilgisi gereklidir.
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
