{% extends "base.html" %}
{% block title %}Chatbot{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-12 col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Egitim Asistani</span>
        <span class="badge text-bg-success">Aktif</span>
      </div>
      <div class="card-body">
        <div id="chatMessages" class="border rounded bg-white p-3 mb-3" style="height: 380px; overflow-y: auto;">
          <div class="mb-2">
            <span class="badge text-bg-primary">Bot</span>
            <div class="mt-1">Merhaba, egitimler, kayit, ucret ve ogrenci girisi hakkinda soru sorabilirsiniz.</div>
          </div>
        </div>

        <form id="chatForm" class="input-group">
          <input
            id="chatInput"
            type="text"
            class="form-control"
            placeholder="Ornek: Egitimleri listele"
            autocomplete="off"
            required
          />
          <button class="btn btn-primary" type="submit">Gonder</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow-sm mb-3">
      <div class="card-header">Hazir Sorular</div>
      <div class="card-body d-grid gap-2">
        <button class="btn btn-outline-primary quick-question" type="button">Egitimleri listele</button>
        <button class="btn btn-outline-primary quick-question" type="button">Kayit nasil yapilir?</button>
        <button class="btn btn-outline-primary quick-question" type="button">Ucretler nedir?</button>
        <button class="btn btn-outline-primary quick-question" type="button">Ogrenci girisi nerede?</button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header">Aktif Egitim Sayisi</div>
      <div class="card-body">
        <div class="display-6">{{ egitimler|length }}</div>
      </div>
    </div>
  </div>
</div>

<script>
const chatForm = document.getElementById('chatForm');
const chatInput = document.getElementById('chatInput');
const chatMessages = document.getElementById('chatMessages');
const quickQuestions = document.querySelectorAll('.quick-question');

function addMessage(sender, text, style) {
  const wrapper = document.createElement('div');
  wrapper.className = 'mb-3';

  const badge = document.createElement('span');
  badge.className = `badge ${style}`;
  badge.textContent = sender;

  const body = document.createElement('div');
  body.className = 'mt-1';
  body.style.whiteSpace = 'pre-line';
  body.textContent = text;

  wrapper.appendChild(badge);
  wrapper.appendChild(body);
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMessage(message) {
  addMessage('Siz', message, 'text-bg-secondary');
  chatInput.value = '';

  const response = await fetch('{{ url_for("chatbot_mesaj") }}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mesaj: message })
  });
  const data = await response.json();
  addMessage('Bot', data.cevap, 'text-bg-primary');
}

chatForm.addEventListener('submit', function (event) {
  event.preventDefault();
  const message = chatInput.value.trim();
  if (message) {
    sendMessage(message);
  }
});

quickQuestions.forEach(function (button) {
  button.addEventListener('click', function () {
    sendMessage(button.textContent);
  });
});
</script>
{% endblock %}
